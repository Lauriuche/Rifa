<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rifa Master Camino</title>

<!-- PWA Meta Tags -->
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="https://drive.google.com/file/d/1NxcO7VCv4i0ZDh-aJDValyEgM7jyH3VY/view?usp=drivesdk">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
    :root {
        --primary: #00ff88;
        --primary-glow: rgba(0, 255, 136, 0.3);
        --bg: #000000;
        --surface: rgba(15, 15, 15, 0.9);
        --surface-accent: rgba(25, 25, 25, 0.9);
        --border: rgba(255, 255, 255, 0.08);
        --text-main: #ffffff;
        --text-dim: #a0a0a0;
        
        --reserved: #ff9500;
        --paid: #00ff88;
        --selected: #007aff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    
    body {
        background: radial-gradient(circle at center, #001a0d 0%, #000000 100%);
        color: var(--text-main);
        /* Usa dvh para garantir altura correta em navegadores mobile */
        height: 100dvh; 
        width: 100vw;
        display: flex; 
        justify-content: center; 
        align-items: center;
        /* Padding de segurança para nunca tocar as bordas */
        padding: 15px; 
        overflow: hidden;
    }

    .ambient-glow {
        position: fixed; width: 80vw; height: 80vw;
        background: var(--primary-glow); filter: blur(150px);
        border-radius: 50%; top: 50%; left: 50%;
        transform: translate(-50%, -50%); z-index: 0; pointer-events: none;
    }

    .container {
        width: 100%; 
        max-width: 440px; 
        /* Altura máxima descontando o padding do body */
        max-height: 100%; 
        border-radius: 35px; 
        background: var(--surface); 
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        display: flex; 
        flex-direction: column; 
        position: relative; 
        z-index: 1;
        overflow: hidden;
    }

    .scrollable-content { 
        padding: 25px 20px 10px 20px;
        overflow-y: auto; 
        scrollbar-width: none; 
        flex: 1; 
    }
    .scrollable-content::-webkit-scrollbar { display: none; }

    .footer-selection {
        background: var(--surface-accent);
        border-top: 1px solid var(--border);
        padding: 15px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom-left-radius: 35px;
        border-bottom-right-radius: 35px;
    }

    .header { 
        text-align: center; 
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 20px; 
    }
    
    .hero-badge { 
        background: rgba(0, 255, 136, 0.1); color: var(--primary); 
        padding: 6px 14px; border-radius: 100px; font-size: 0.65rem; 
        font-weight: 800; border: 1px solid rgba(0, 255, 136, 0.2); 
        margin-bottom: 12px; display: inline-block; text-transform: uppercase;
    }
    
    .logo-img { width: 100%; max-width: 140px; border-radius: 18px; margin-bottom: 12px; filter: drop-shadow(0 0 15px var(--primary-glow)); display: block; }
    
    .prize-card {
        background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
        border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 15px;
        width: 100%;
    }
    .prize-title { font-size: 1.2rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .prize-desc { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 10px; font-weight: 400; line-height: 1.3; }
    .price-badge { 
        background: linear-gradient(135deg, #00ff88 0%, #00cc6d 100%); color: #000;
        display: inline-block; padding: 5px 14px; border-radius: 10px;
        font-weight: 900; font-size: 1rem; box-shadow: 0 6px 12px var(--primary-glow);
    }

    .tabs { display: flex; gap: 4px; margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 15px; width: 100%; }
    .tab-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; background: transparent; color: var(--text-dim); font-size: 0.65rem; font-weight: 800; cursor: pointer; transition: 0.3s; }
    .tab-btn.active { background: var(--surface-accent); color: var(--primary); border: 1px solid var(--border); }

    /* Grid de 8 Colunas */
    .numbers-grid { 
        display: grid; 
        grid-template-columns: repeat(8, 1fr); 
        gap: 5px; 
        margin-bottom: 15px; 
    }
    
    .num { 
        aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.05); border: 1px solid var(--border);
        border-radius: 6px; font-size: 0.6rem; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    
    .num.selected { background: var(--selected); color: #ffffff; box-shadow: 0 0 8px rgba(0, 122, 255, 0.4); }
    .num.reserved { background: var(--reserved); color: #000; cursor: not-allowed; }
    .num.paid { background: var(--paid); color: #000; cursor: not-allowed; }

    .form-input { 
        width: 100%; padding: 14px; border-radius: 15px; border: 1px solid var(--border); 
        background: rgba(255,255,255,0.04); color: #fff; text-align: center; font-size: 0.9rem; 
        outline: none; margin-bottom: 10px;
    }

    .btn-main { 
        padding: 14px 20px; border-radius: 15px; background: var(--primary); 
        color: #000; font-weight: 800; border: none; cursor: pointer; 
        box-shadow: 0 8px 20px var(--primary-glow); font-size: 0.85rem; 
        transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-main:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 5000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); padding: 20px; }
    .modal-box { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 30px; padding: 25px; text-align: center; }
    
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 12px 24px; border-radius: 100px; font-weight: 800; z-index: 9999; display: none; box-shadow: 0 10px 30px var(--primary-glow); font-size: 0.75rem; text-align: center; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.1); border-top: 2px solid #000; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .my-number-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
    .status-badge { font-size: 0.55rem; padding: 3px 8px; border-radius: 100px; font-weight: 800; }

    .admin-footer { display: flex; justify-content: center; gap: 12px; margin: 15px 0; }
    .admin-btn { background: transparent; border: none; color: var(--text-dim); font-size: 0.6rem; font-weight: 700; cursor: pointer; text-transform: uppercase; }

    .legend { display: flex; justify-content: center; gap: 8px; font-size: 0.55rem; color: var(--text-dim); margin-bottom: 12px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; margin-right: 3px; }
</style>
</head>
<body>

<div class="ambient-glow"></div>

<div class="container">
    <div class="scrollable-content">
        <div class="header">
            <div class="hero-badge">🍀 RIFA MASTER EXCLUSIVA</div>
            <img src="1776393050679.png" class="logo-img">
            <div class="prize-card">
                <h2 class="prize-title" id="display-premio">...</h2>
                <p class="prize-desc" id="display-descricao">...</p>
                <div class="price-badge" id="display-valor">R$ 0,00</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('rifa', this)">ESCOLHER NÚMEROS</button>
            <button class="tab-btn" onclick="switchTab('consulta', this)">MINHAS COTAS</button>
        </div>

        <div id="view-rifa">
            <div class="legend">
                <span><i class="dot" style="background:rgba(255,255,255,0.2)"></i>Livre</span>
                <span><i class="dot" style="background:var(--reserved)"></i>Reservado</span>
                <span><i class="dot" style="background:var(--paid)"></i>Pago</span>
            </div>
            <div class="numbers-grid" id="grid"></div>
        </div>

        <div id="view-consulta" style="display:none; padding-bottom: 15px;">
            <input type="tel" id="search-phone" class="form-input" placeholder="Telefone (DDD)" oninput="maskPhone(this)">
            <button class="btn-main" style="width:100%" onclick="consultarMeusNumeros()">VERIFICAR ESTADO</button>
            
            <div id="result-area" style="display:none; margin-top:20px;">
                <div id="info-participante" style="font-weight:800; color:var(--primary); text-align:center; margin-bottom:15px; font-size: 0.85rem;"></div>
                
                <button id="btnPagarTodos" class="btn-main" style="width:100%; margin-bottom:15px; background:var(--selected); color:#fff; display:none;" onclick="pagarTodasPendentes()">
                    💳 PAGAR TODOS OS PENDENTES
                </button>
                
                <div id="result-consulta"></div>
            </div>
        </div>

        <div class="admin-footer">
            <button class="admin-btn" onclick="askAdmin('config')">⚙️ Configurações</button>
            <button class="admin-btn" onclick="askAdmin('limpar')">🗑️ Reset</button>
        </div>
    </div>

    <!-- Barra de seleção fixa na base interna do container -->
    <div id="footer-rifa" class="footer-selection">
        <div style="flex: 1;">
            <p style="font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800;">Subtotal:</p>
            <p id="footer-total" style="font-size: 1rem; font-weight: 800; color: var(--primary);">R$ 0,00</p>
        </div>
        <button class="btn-main" id="btnReserva" disabled onclick="abrirCheckout()">
            RESERVAR <i data-lucide="chevron-right" style="width: 14px;"></i>
        </button>
    </div>
</div>

<!-- Modal Checkout -->
<div class="modal-overlay" id="modalCheckout">
    <div class="modal-box">
        <h2 style="color:var(--primary); margin-bottom:15px; font-size: 1.1rem;">DADOS DA RESERVA</h2>
        <input type="text" id="nome" class="form-input" placeholder="NOME COMPLETO">
        <input type="tel" id="telefone" class="form-input" placeholder="WHATSAPP (DDD)" oninput="maskPhone(this)">
        <div id="resumo-numeros" style="background:rgba(255,255,255,0.03); padding:12px; border-radius:15px; margin-bottom:15px; font-weight:800; font-size:0.75rem; line-height:1.4; color: var(--primary);"></div>
        <button class="btn-main" id="btnConfirmar" style="width: 100%;" onclick="triggerCheckout()">
            💳 PAGAR COM PIX
        </button>
        <button class="admin-btn" style="width:100%; margin-top:15px;" onclick="fecharModal('modalCheckout')">CANCELAR</button>
    </div>
</div>

<!-- Modal Config -->
<div class="modal-overlay" id="modalConfig">
    <div class="modal-box">
        <h3 style="margin-bottom:15px; font-size: 1rem;">AJUSTES DA RIFA</h3>
        <input type="text" id="cfg-premio" class="form-input" placeholder="Nome do Prêmio">
        <textarea id="cfg-descricao" class="form-input" placeholder="Descrição Detalhada" style="height: 70px; resize: none;"></textarea>
        <input type="number" id="cfg-valor" class="form-input" placeholder="Valor por Número">
        <input type="number" id="cfg-total" class="form-input" placeholder="Total de Números">
        <button class="btn-main" style="width: 100%;" onclick="salvarConfig()">SALVAR</button>
        <button class="admin-btn" style="margin-top:15px; width:100%;" onclick="fecharModal('modalConfig')">FECHAR</button>
    </div>
</div>

<!-- Modal PIN -->
<div class="modal-overlay" id="modalSenha">
    <div class="modal-box">
        <h3>PIN ADMIN</h3>
        <input type="password" id="pin-input" class="form-input" placeholder="****" maxlength="4" style="font-size:1.5rem; letter-spacing:8px;">
        <button class="btn-main" style="width: 100%;" onclick="checkAdminPass()">ENTRAR</button>
        <button class="admin-btn" style="margin-top:15px; width:100%;" onclick="fecharModal('modalSenha')">CANCELAR</button>
    </div>
</div>

<div id="toast" class="toast">SUCESSO!</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfiZPr24kg4O04VFYh6SXdHE257N6Xwng",
  authDomain: "vagner-34d5b.firebaseapp.com",
  databaseURL: "https://vagner-34d5b.firebaseio.com",
  projectId: "vagner-34d5b",
  storageBucket: "vagner-34d5b.firebasestorage.app",
  messagingSenderId: "711539772164",
  appId: "1:711539772164:web:e5c0457cb69f8e7d0bde51"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const cfgRef = ref(db, "rifa_master/config");
const numRef = ref(db, "rifa_master/numeros");

const CONFIG_BASE = { 
    HANDLE: "vagner_lauriuche--inc",
    PIN: "6261"
};

let config = { premio: "iPhone 15 Pro", descricao: "O melhor smartphone do mundo", valor: 5, total: 100 };
let dbNumbers = {};
let selected = new Set();
let acaoAdmin = null;

let currentConsultation = {
    nome: "",
    telefone: "",
    pendentes: []
};

lucide.createIcons();

onValue(cfgRef, (s) => { 
    if(s.exists()) { 
        config = s.val(); 
        if(!config.descricao) config.descricao = "Participe e concorra!";
        updateUI(); 
    } 
});

onValue(numRef, (s) => { dbNumbers = s.exists() ? s.val() : {}; renderGrid(); });

function updateUI() {
    document.getElementById('display-premio').innerText = config.premio;
    document.getElementById('display-descricao').innerText = config.descricao;
    const valorDisplay = document.getElementById('display-valor');
    if(valorDisplay) valorDisplay.innerText = config.valor.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
    
    document.getElementById('cfg-premio').value = config.premio;
    document.getElementById('cfg-descricao').value = config.descricao;
    document.getElementById('cfg-valor').value = config.valor;
    document.getElementById('cfg-total').value = config.total;
    updateSelectionBar();
}

function renderGrid() {
    const grid = document.getElementById('grid');
    if(!grid) return;
    grid.innerHTML = '';
    for(let i=1; i<=config.total; i++) {
        const n = i.toString().padStart(2, '0');
        const el = document.createElement('div');
        el.className = 'num';
        el.innerText = n;
        
        if(dbNumbers[n]) {
            el.classList.add(dbNumbers[n].status);
        } else {
            if(selected.has(n)) el.classList.add('selected');
            el.onclick = () => toggleNumber(n);
        }
        grid.appendChild(el);
    }
}

function toggleNumber(n) {
    selected.has(n) ? selected.delete(n) : selected.add(n);
    renderGrid();
    updateSelectionBar();
}

function updateSelectionBar() {
    const total = selected.size * config.valor;
    const footerTotal = document.getElementById('footer-total');
    if(footerTotal) footerTotal.innerText = total.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
    const btnReserva = document.getElementById('btnReserva');
    if(btnReserva) btnReserva.disabled = selected.size === 0;
}

window.switchTab = (tab, btn) => {
    document.getElementById('view-rifa').style.display = tab === 'rifa' ? 'block' : 'none';
    document.getElementById('view-consulta').style.display = tab === 'consulta' ? 'block' : 'none';
    document.getElementById('footer-rifa').style.display = tab === 'rifa' ? 'flex' : 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
};

window.abrirCheckout = () => {
    document.getElementById('resumo-numeros').innerText = "COTAS SELECIONADAS: " + Array.from(selected).sort().join(', ');
    document.getElementById('modalCheckout').style.display = 'flex';
};

async function callInfinitePay(n, t, orderId, valorCentavos, desc) {
    let baseUrl = window.location.origin + window.location.pathname;
    if (!baseUrl.startsWith('http') || baseUrl.includes('usercontent.goog')) {
        baseUrl = "https://vagnermagazine.com.br/rifa"; 
    }
    const returnUrl = baseUrl + `?order_nsu=${orderId}`;

    let cleanPhone = t.replace(/\D/g, '');
    if (!cleanPhone.startsWith('55')) cleanPhone = '55' + cleanPhone;

    let safeName = n.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^\w\s]/gi, '').trim().substring(0, 40);
    if (!safeName.includes(' ')) safeName += ' Silva';

    const payload = {
        "handle": CONFIG_BASE.HANDLE.trim(),
        "order_nsu": orderId,
        "redirect_url": returnUrl,
        "customer": {
            "name": safeName,
            "email": `rifa${Date.now().toString().slice(-5)}@vagnermagazine.com.br`,
            "phone_number": cleanPhone
        },
        "items": [{ 
            "quantity": 1, 
            "price": valorCentavos, 
            "description": desc,
            "image": "https://play-lh.googleusercontent.com/JCYKHXuu2Q6IzhmkW9N4bDX0S8_3XVYnlPtheNcdwlOaSr0TTKJljm3RVexsXkw3_ec"
        }]
    };

    const response = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://api.infinitepay.io/invoices/public/checkout/links'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.message || "Erro na API");
    
    return data.checkout_url || data.url;
}

window.triggerCheckout = async () => {
    const n = document.getElementById('nome').value.trim();
    const t = document.getElementById('telefone').value.trim();
    if(n.split(' ').length < 2 || t.length < 14) return showToast("⚠️ Nome completo e Telefone!");

    const btn = document.getElementById('btnConfirmar');
    btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>';

    const orderId = "R" + Date.now().toString().slice(-10);
    const valorCentavos = Math.round(selected.size * config.valor * 100);

    try {
        const updates = {};
        const timestamp = Date.now();
        selected.forEach(num => {
            updates[num] = { nome: n, telefone: t, status: 'reserved', order_nsu: orderId, timestamp };
        });
        await update(numRef, updates);

        const checkoutUrl = await callInfinitePay(n, t, orderId, valorCentavos, `Rifa ${config.premio} (${selected.size} Números)`);
        
        if(checkoutUrl) {
            selected.clear();
            window.location.href = checkoutUrl; 
        } else throw new Error();

    } catch(e) { 
        showToast("❌ " + e.message); 
        btn.disabled = false; btn.innerHTML = "💳 PAGAR AGORA"; 
    }
};

window.consultarMeusNumeros = async () => {
    const tel = document.getElementById('search-phone').value.replace(/\D/g, '');
    if(tel.length < 10) return showToast("⚠️ Telefone incompleto!");

    const resultArea = document.getElementById('result-area');
    const res = document.getElementById('result-consulta');
    const info = document.getElementById('info-participante');
    const btnPagarTodos = document.getElementById('btnPagarTodos');
    
    resultArea.style.display = 'block';
    res.innerHTML = '<center><div class="spinner"></div></center>';
    btnPagarTodos.style.display = 'none';

    const snapshot = await get(numRef);
    res.innerHTML = '';
    
    if(snapshot.exists()){
        const meus = Object.entries(snapshot.val()).filter(([n, d]) => d.telefone.replace(/\D/g, '') === tel);
        
        if(meus.length > 0){
            const pendentes = meus.filter(([n, d]) => d.status === 'reserved');
            
            currentConsultation.nome = meus[0][1].nome;
            currentConsultation.telefone = tel;
            currentConsultation.pendentes = pendentes.map(([n, d]) => n);

            info.innerText = "👤 PARTICIPANTE: " + currentConsultation.nome;
            
            if(pendentes.length > 1) {
                btnPagarTodos.style.display = 'block';
                btnPagarTodos.innerText = `💳 PAGAR ${pendentes.length} PENDENTES (R$ ${(pendentes.length * config.valor).toFixed(2)})`;
            }

            meus.forEach(([n, d]) => {
                const isPago = d.status === 'paid';
                let corStatus = isPago ? 'var(--paid)' : 'var(--reserved)';
                res.innerHTML += `
                    <div class="my-number-row">
                        <b> ${n}</b>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <span class="status-badge" style="background:${corStatus}; color:#000;">${d.status.toUpperCase()}</span>
                            ${!isPago ? `<button class="admin-btn" style="color:var(--primary); font-size:0.6rem; border:1px solid var(--primary); padding:4px 8px; border-radius:8px;" onclick="pagarCotaUnica('${n}','${d.nome}','${d.telefone}')">PAGAR</button>` : ''}
                        </div>
                    </div>`;
            });
        } else { 
            info.innerText = ''; 
            res.innerHTML = '<p style="text-align:center; font-size: 0.8rem; color: var(--text-dim);">Nenhum número encontrado.</p>'; 
        }
    }
};

window.pagarTodasPendentes = async () => {
    const { nome, telefone, pendentes } = currentConsultation;
    if(pendentes.length === 0) return;

    const btn = document.getElementById('btnPagarTodos');
    const originalText = btn.innerText;
    btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>';

    const orderId = "RT" + Date.now().toString().slice(-8);
    const valorCentavos = Math.round(pendentes.length * config.valor * 100);

    try {
        const updates = {};
        pendentes.forEach(num => {
            updates[`${num}/order_nsu`] = orderId;
        });
        await update(numRef, updates);

        const checkoutUrl = await callInfinitePay(nome, telefone, orderId, valorCentavos, `Rifa ${config.premio} (${pendentes.length} Cotas)`);
        if(checkoutUrl) window.location.href = checkoutUrl;
    } catch(e) { 
        showToast("❌ Erro ao agrupar pagamento."); 
        btn.disabled = false; btn.innerText = originalText;
    }
};

window.pagarCotaUnica = async (num, nome, telefone) => {
    const orderId = "RS" + num + Date.now().toString().slice(-6);
    await update(ref(db, `rifa_master/numeros/${num}`), { order_nsu: orderId });
    
    try {
        const checkoutUrl = await callInfinitePay(nome, telefone, orderId, Math.round(config.valor * 100), `Cota #${num} - ${config.premio}`);
        if(checkoutUrl) window.location.href = checkoutUrl;
    } catch(e) { showToast("❌ Erro no checkout."); }
};

async function checkReturn() {
    const nsu = new URLSearchParams(window.location.search).get('order_nsu');
    if(!nsu) return;
    const s = await get(numRef);
    if(s.exists()){
        const updates = {}; let ok = false;
        Object.entries(s.val()).forEach(([num, info]) => {
            if(info.order_nsu === nsu && info.status === 'reserved') {
                updates[num + "/status"] = "paid"; ok = true;
            }
        });
        if(ok) {
            await update(numRef, updates);
            window.history.replaceState({}, '', window.location.pathname);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            showToast("✅ PAGAMENTO CONFIRMADO!");
        }
    }
}

window.askAdmin = (act) => { acaoAdmin = act; document.getElementById('pin-input').value = ''; document.getElementById('modalSenha').style.display = 'flex'; };
window.checkAdminPass = () => {
    if(document.getElementById('pin-input').value === CONFIG_BASE.PIN){
        fecharModal('modalSenha');
        if(acaoAdmin === 'config') document.getElementById('modalConfig').style.display = 'flex';
        if(acaoAdmin === 'limpar') { if(confirm("Resetar toda a rifa?")) remove(numRef); }
    } else { showToast("❌ PIN Incorreto!"); }
};
window.salvarConfig = () => {
    const newConfig = { 
        premio: document.getElementById('cfg-premio').value, 
        descricao: document.getElementById('cfg-descricao').value,
        valor: parseFloat(document.getElementById('cfg-valor').value), 
        total: parseInt(document.getElementById('cfg-total').value) 
    };
    set(cfgRef, newConfig).then(() => fecharModal('modalConfig'));
};

window.maskPhone = i => { let v = i.value.replace(/\D/g,""); v=v.replace(/^(\d{2})(\d)/g,"($1) $2"); v=v.replace(/(\d)(\d{4})$/,"$1-$2"); i.value = v; };
window.fecharModal = id => document.getElementById(id).style.display = 'none';
window.openModal = id => document.getElementById(id).style.display = 'flex';

function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 5000); }

checkReturn();
</script>
</body>
