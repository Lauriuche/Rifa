<html>
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento R$ 1,00 - Teste</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner {
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #4ade80;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
                <span class="text-2xl">🥑</span>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Ativação de Conta</h2>
            <p class="text-slate-500 mt-1">Pagamento simbólico de <b>R$ 1,00</b></p>
        </div>

        <form id="registoForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Ex: Maria Silva" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Telemóvel (DDD + Número)</label>
                <input type="tel" id="telefone" required placeholder="11999999999" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>

            <button type="submit" id="btnPagar" 
                class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-3 mt-6">
                <span id="txtBotao">Gerar PIX de R$ 1,00</span>
            </button>
        </form>

        <div id="status" class="mt-6 text-center text-sm font-medium hidden p-4 rounded-xl"></div>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Modo de Aprendizagem</p>
        </div>
    </div>

    <script>
        // Chave de API fornecida
        const API_KEY = "Abc_dev_LqRMqFbhyu0DbLwMuH1ZMAby";
        
        /**
         * Tentaremos usar um proxy diferente que costuma ser mais permissivo.
         * Se falhar, o problema é o bloqueio do seu Navegador/Rede aos proxies.
         */
        const PROXY = "https://api.allorigins.win/raw?url=";
        const ENDPOINT = "https://api.abacatepay.com/v1/billing/create";

        const form = document.getElementById('registoForm');
        const btn = document.getElementById('btnPagar');
        const txtBotao = document.getElementById('txtBotao');
        const status = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            btn.disabled = true;
            txtBotao.innerHTML = '<div class="spinner"></div> Criando...';
            status.classList.add('hidden');

            const payload = {
                frequency: "ONE_TIME",
                methods: ["PIX"],
                products: [{
                    externalId: "exp_001",
                    name: "Taxa de Ativação",
                    quantity: 1,
                    price: 100 // R$ 1,00
                }],
                returnUrl: window.location.href,
                completionUrl: window.location.href,
                customer: {
                    name: document.getElementById('nome').value,
                    cellphone: document.getElementById('telefone').value,
                    taxId: "00000000000"
                }
            };

            try {
                // Usando o proxy AllOrigins para contornar o CORS
                const response = await fetch(PROXY + encodeURIComponent(ENDPOINT), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Erro ${response.status}: ${errorText || 'Falha na API'}`);
                }

                const result = await response.json();

                if (result.data?.url) {
                    status.innerHTML = "✅ Pix gerado! Redirecionando...";
                    status.className = "mt-6 text-center text-sm p-4 rounded-xl bg-green-50 text-green-600 block";
                    setTimeout(() => { window.location.href = result.data.url; }, 1000);
                } else {
                    throw new Error("Resposta inválida da API.");
                }

            } catch (err) {
                console.error("Erro completo:", err);
                
                // Mensagem amigável para o erro de fetch
                let msg = "Erro ao conectar.";
                if (err.message.includes("fetch") || err.message.includes("Failed")) {
                    msg = "O seu navegador bloqueou a conexão de teste (CORS). Tente usar uma extensão de 'Allow CORS' no Chrome ou teste em aba anônima.";
                } else {
                    msg = err.message;
                }

                status.innerHTML = "❌ " + msg;
                status.className = "mt-6 text-center text-sm p-4 rounded-xl bg-red-50 text-red-600 block";
                
                btn.disabled = false;
                txtBotao.innerText = 'Tentar novamente';
            }
        });
    </script>
</body>
</html>
